name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Do NOT cancel in-progress deploys — that was causing "Deployment cancelled"
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      # configure-pages with explicit enablement ensures the repo's Pages
      # source is set to "GitHub Actions" (not "Deploy from a branch").
      # Without this, GitHub cancels the Actions deployment.
      - name: Setup Pages (force Actions source)
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages (with retry)
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 900000    # 15 min internal timeout
          error_count: 10    # max retries
